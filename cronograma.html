<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CronoMed — Meu Cronograma</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;0,9..144,900;1,9..144,300;1,9..144,700&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        cm: {
                            dark: '#0a0f0d',
                            dark2: '#111a15',
                            mid: '#1e2e25',
                            green: '#00c27a',
                            greenD: '#009f64',
                            text: '#e8f0eb',
                            muted: '#7a9e8a'
                        }
                    },
                    fontFamily: { sans: ['DM Sans', 'sans-serif'], serif: ['Fraunces', 'serif'] }
                }
            }
        }
    </script>

    <style>
        html, body { height: 100%; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        
        /* Tema Claro (Padrão) */
        body { background-color: #f8fafc; color: #1e293b; }
        .glass-header { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border-bottom: 1px solid #e2e8f0; }
        .sidebar { background: #ffffff; border-right: 1px solid #e2e8f0; }
        .card-ui { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 1.5rem; transition: all 0.3s ease; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .card-ui:hover { border-color: #cbd5e1; transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); }
        
        /* Tema Escuro (Ativado via classe .dark no HTML) */
        .dark body { background-color: #0a0f0d; color: #e8f0eb; }
        .dark .glass-header { background: rgba(10, 15, 13, 0.9); border-bottom-color: rgba(0,194,122,0.1); }
        .dark .sidebar { background: rgba(17, 26, 21, 0.95); border-right-color: rgba(0,194,122,0.1); }
        .dark .card-ui { background: #111a15; border-color: rgba(255,255,255,0.06); box-shadow: none; }
        .dark .card-ui:hover { border-color: rgba(0,194,122,0.2); }
        .dark input, .dark select, .dark textarea { background: #1e2e25; border-color: rgba(255,255,255,0.1); color: white; }
        .dark .text-slate-800 { color: #ffffff; }
        .dark .text-slate-600 { color: #e8f0eb; }
        .dark .text-gray-500 { color: #7a9e8a; }
        .dark .bg-gray-50 { background-color: #1e2e25; }
        .dark .border-gray-200 { border-color: rgba(255,255,255,0.1); }
        .dark .agenda-cell { color: #e8f0eb; }

        .sidebar { transition: margin-left 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; z-index: 40; }
        .sidebar-hidden { margin-left: -20rem; }
        .sidebar-content { flex: 1; overflow-y: auto; overflow-x: hidden; padding-bottom: 20px; }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #1e2e25; }
        
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        [contenteditable]:empty:before { content: attr(placeholder); color: #94a3b8; display: block; }
        
        /* Linhas de Prioridade */
        .prio-1 { border-left: 4px solid #ff4d4d !important; }
        .prio-2 { border-left: 4px solid #f59e0b !important; }
        .prio-3 { border-left: 4px solid #3b82f6 !important; }
        .prio-4 { border-left: 4px solid #94a3b8 !important; }
        .prio-rev { border-left: 4px dashed #00c27a !important; }

        .task-card.done { opacity: 0.5; filter: grayscale(0.6); }
        
        /* Modal */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 1rem; }
        .modal-overlay.open { display: flex; }
        .modal-content { background: #ffffff; border-radius: 24px; padding: 2.5rem; w-full max-w: 500px; position: relative; box-shadow: 0 20px 40px rgba(0,0,0,0.2); animation: scaleIn 0.2s ease; }
        .dark .modal-content { background: #111a15; border: 1px solid rgba(0,194,122,0.2); }
        @keyframes scaleIn { from { opacity: 0; transform: scale(.95); } to { opacity: 1; transform: scale(1); } }

        /* Agenda / Timeline */
        .timeline-item { position: relative; padding-left: 1.5rem; border-left: 2px solid #e2e8f0; margin-bottom: 1.5rem; }
        .dark .timeline-item { border-left-color: #1e2e25; }
        .timeline-item::before { content: ''; position: absolute; left: -0.35rem; top: 0; width: 0.6rem; height: 0.6rem; border-radius: 50%; background: #00c27a; }

        .custom-checkbox { width: 1.5rem; height: 1.5rem; border-radius: 6px; border: 2px solid #cbd5e1; appearance: none; background-color: transparent; cursor: pointer; position: relative; transition: all 0.2s; }
        .dark .custom-checkbox { border-color: rgba(255,255,255,0.3); }
        .custom-checkbox:checked { background-color: #00c27a; border-color: #00c27a; }
        .custom-checkbox:checked::after { content: '✓'; position: absolute; color: white; font-size: 1rem; font-weight: 900; top: 50%; left: 50%; transform: translate(-50%, -50%); }

        .fade-enter { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .task-details-wrapper { transition: max-height 0.3s ease, opacity 0.2s ease; max-height: 0; opacity: 0; overflow: hidden; }
        .task-details-wrapper.expanded { max-height: 500px; opacity: 1; }

        /* Player Spotify-like */
        .mini-player { position: fixed; bottom: 20px; right: 20px; z-index: 999; background: #ffffff; border: 1px solid #e2e8f0; border-radius: 100px; padding: 0.5rem 1rem; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: none; align-items: center; gap: 1rem; transition: transform 0.2s; }
        .dark .mini-player { background: #111a15; border-color: #00c27a; box-shadow: 0 10px 25px rgba(0,194,122,0.1); }
        .mini-player.show { display: flex; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(100px); } to { transform: translateY(0); } }

        /* Loader Overlay */
        #loader-overlay { position: fixed; inset: 0; background: #f8fafc; z-index: 9999; display: flex; flex-col; align-items: center; justify-content: center; }
        .dark #loader-overlay { background: #0a0f0d; }
    </style>
</head>
<body class="transition-colors duration-300">

    <!-- OVERLAY DE CARREGAMENTO -->
    <div id="loader-overlay">
        <i class="fas fa-circle-notch fa-spin text-5xl text-cm-green mb-4"></i>
        <h2 class="text-2xl font-serif font-bold text-slate-800 dark:text-white">A carregar o seu Cronograma...</h2>
        <p class="text-gray-500 mt-2" id="loader-text">Sincronizando dados com a nuvem</p>
    </div>

    <!-- TOAST -->
    <div id="toast-container" class="fixed top-20 right-6 z-[9999] flex flex-col gap-3 pointer-events-none"></div>

    <!-- MINI PLAYER POMODORO -->
    <div id="mini-player" class="mini-player">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-emerald-100 dark:bg-cm-mid flex items-center justify-center text-cm-green animate-pulse"><i class="fas fa-clock"></i></div>
            <div class="flex flex-col">
                <span class="text-[10px] font-bold uppercase text-gray-500 tracking-widest leading-none mb-1" id="mp-phase">Foco: Aula</span>
                <span class="font-mono font-black text-lg text-slate-800 dark:text-white leading-none" id="mp-time">50:00</span>
            </div>
        </div>
        <div class="flex items-center gap-2 border-l border-gray-200 dark:border-gray-700 pl-3">
            <button onclick="window.togglePomo()" class="w-10 h-10 rounded-full bg-slate-900 text-white dark:bg-cm-green dark:text-cm-dark flex items-center justify-center hover:scale-105 transition shadow-md" id="mp-play-btn"><i class="fas fa-pause"></i></button>
            <button onclick="window.stopPomo()" class="w-8 h-8 rounded-full text-gray-400 hover:text-red-500 hover:bg-gray-100 dark:hover:bg-cm-mid transition flex items-center justify-center"><i class="fas fa-times"></i></button>
        </div>
    </div>

    <div class="h-screen flex flex-col pb-16 md:pb-0 relative z-10">
        
        <!-- HEADER -->
        <header class="glass-header p-4 z-50 flex-shrink-0 flex justify-between items-center transition-colors duration-300">
            <div class="flex items-center gap-4 md:gap-6">
                <button onclick="toggleSidebar()" class="text-gray-500 hover:text-cm-green focus:outline-none transition-colors"><i class="fas fa-bars text-xl"></i></button>
                <div class="font-serif font-black text-2xl text-slate-900 dark:text-white tracking-tight">Crono<span class="text-cm-green">Med</span></div>
            </div>
            <div class="text-right flex items-center gap-3 md:gap-5">
                <button onclick="toggleDarkMode()" class="text-gray-400 hover:text-slate-800 dark:hover:text-white transition text-lg" title="Mudar Tema"><i class="fas fa-moon" id="theme-icon"></i></button>
                <div class="relative cursor-pointer group" onclick="toggleProfileMenu()">
                    <div class="w-10 h-10 rounded-full bg-cm-green text-white font-bold flex items-center justify-center shadow-md uppercase" id="user-avatar">A</div>
                    <!-- Menu de Perfil -->
                    <div id="profile-menu" class="absolute right-0 top-12 mt-2 w-48 bg-white dark:bg-cm-dark2 rounded-xl shadow-xl border border-gray-200 dark:border-gray-700 py-2 hidden flex-col z-50 transition-colors">
                        <div class="px-4 py-2 border-b border-gray-100 dark:border-gray-800 mb-1">
                            <p class="text-sm font-bold text-slate-800 dark:text-white truncate" id="user-name">Usuário</p>
                            <p class="text-[10px] text-gray-500 truncate" id="user-email">email@email.com</p>
                        </div>
                        <button onclick="window.recalculateRoute()" class="w-full text-left px-4 py-2 text-sm text-slate-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-cm-mid flex items-center gap-2"><i class="fas fa-sync-alt w-4"></i> Recalcular Rota</button>
                        <button onclick="window.handleLogout()" class="w-full text-left px-4 py-2 text-sm text-red-500 hover:bg-red-50 dark:hover:bg-red-500/10 flex items-center gap-2"><i class="fas fa-sign-out-alt w-4"></i> Sair</button>
                    </div>
                </div>
            </div>
        </header>

        <div class="flex flex-1 overflow-hidden relative">
            <!-- SIDEBAR -->
            <aside id="main-sidebar" class="w-72 sidebar hidden md:flex">
                <div class="p-5 border-b border-gray-200 dark:border-gray-800 space-y-2 shrink-0">
                    <button onclick="switchView('homepage')" id="nav-homepage" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold transition-all bg-cm-green/10 text-cm-green dark:bg-cm-green text-left"><i class="fas fa-home text-lg w-5 text-center"></i><span>Página Inicial</span></button>
                    <button onclick="switchView('week')" id="nav-week" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold transition-all text-gray-500 hover:bg-gray-100 dark:hover:bg-cm-mid dark:text-cm-muted hover:text-slate-800 dark:hover:text-white text-left"><i class="fas fa-calendar-alt text-lg w-5 text-center"></i><span>A Minha Semana</span></button>
                    <button onclick="switchView('dashboard')" id="nav-dashboard" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold transition-all text-gray-500 hover:bg-gray-100 dark:hover:bg-cm-mid dark:text-cm-muted hover:text-slate-800 dark:hover:text-white text-left"><i class="fas fa-chart-pie text-lg w-5 text-center"></i><span>Dashboard</span></button>
                    <button onclick="switchView('search')" id="nav-search" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold transition-all text-gray-500 hover:bg-gray-100 dark:hover:bg-cm-mid dark:text-cm-muted hover:text-slate-800 dark:hover:text-white text-left"><i class="fas fa-search text-lg w-5 text-center"></i><span>Banco de Tarefas</span></button>
                </div>
                <div class="px-5 pt-4 pb-2 text-[10px] uppercase font-bold text-gray-400 dark:text-cm-muted tracking-widest">Navegação Rápida</div>
                <nav class="px-3 space-y-1 sidebar-content" id="week-nav"></nav>
            </aside>

            <!-- MAIN CONTENT -->
            <main class="flex-1 p-4 md:p-8 overflow-y-auto relative w-full" id="main-scroll">
                <div id="content-area" class="container mx-auto max-w-6xl pb-24"></div>
            </main>
        </div>

        <!-- MOBILE NAV -->
        <nav class="md:hidden fixed bottom-0 left-0 w-full glass-header flex justify-around p-3 z-50">
            <button onclick="switchView('homepage')" class="flex flex-col items-center text-gray-500 dark:text-cm-muted hover:text-cm-green transition-colors"><i class="fas fa-home text-xl mb-1"></i><span class="text-[9px] font-bold uppercase">Início</span></button>
            <button onclick="switchView('week')" class="flex flex-col items-center text-gray-500 dark:text-cm-muted hover:text-cm-green transition-colors"><i class="fas fa-calendar-alt text-xl mb-1"></i><span class="text-[9px] font-bold uppercase">Semana</span></button>
            <button onclick="switchView('dashboard')" class="flex flex-col items-center text-gray-500 dark:text-cm-muted hover:text-cm-green transition-colors"><i class="fas fa-chart-pie text-xl mb-1"></i><span class="text-[9px] font-bold uppercase">Resumo</span></button>
            <button onclick="switchView('search')" class="flex flex-col items-center text-gray-500 dark:text-cm-muted hover:text-cm-green transition-colors"><i class="fas fa-search text-xl mb-1"></i><span class="text-[9px] font-bold uppercase">Buscar</span></button>
        </nav>
    </div>

    <!-- MODALS -->
    <!-- ADD TASK -->
    <div class="modal-overlay" id="modal-add-task">
        <div class="modal-content text-slate-800 dark:text-white">
            <button class="absolute top-4 right-4 text-gray-400 hover:text-slate-800 dark:hover:text-white" onclick="closeModal('add-task')"><i class="fas fa-times text-xl"></i></button>
            <h3 class="text-2xl font-serif mb-2">Novo Tema</h3>
            <p class="text-sm text-gray-500 dark:text-cm-muted mb-6">Adicione um conteúdo extra à sua semana.</p>
            
            <div class="space-y-4 mb-6">
                <div>
                    <label class="block text-[10px] font-bold uppercase text-gray-500 tracking-widest mb-1.5">Nome da Aula/Tema</label>
                    <input type="text" id="add-nome" placeholder="Ex: Aula Prática de Suturas" class="w-full bg-gray-50 dark:bg-cm-mid border border-gray-200 dark:border-gray-700 rounded-xl p-3 text-sm outline-none focus:border-cm-green">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-bold uppercase text-gray-500 tracking-widest mb-1.5">Área Principal</label>
                        <select id="add-area" class="w-full bg-gray-50 dark:bg-cm-mid border border-gray-200 dark:border-gray-700 rounded-xl p-3 text-sm outline-none focus:border-cm-green">
                            <option value="Cirurgia">Cirurgia</option>
                            <option value="Clínica Médica">Clínica Médica</option>
                            <option value="Ginecologia e Obstetrícia">Gineco e Obstetrícia</option>
                            <option value="Pediatria">Pediatria</option>
                            <option value="Preventiva">Preventiva</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold uppercase text-gray-500 tracking-widest mb-1.5">Prioridade</label>
                        <select id="add-prio" class="w-full bg-gray-50 dark:bg-cm-mid border border-gray-200 dark:border-gray-700 rounded-xl p-3 text-sm outline-none focus:border-cm-green">
                            <option value="1">Alta (Crucial)</option>
                            <option value="2" selected>Média</option>
                            <option value="3">Baixa</option>
                            <option value="4">Opcional</option>
                        </select>
                    </div>
                </div>
            </div>
            <button onclick="saveCustomTask()" class="w-full bg-cm-green text-white dark:text-cm-dark py-3.5 rounded-xl font-bold hover:bg-cm-greenD transition shadow-md">Adicionar à Semana</button>
        </div>
    </div>

    <!-- AGENDA REPLICATOR -->
    <div class="modal-overlay" id="modal-replica-agenda">
        <div class="modal-content text-center">
            <div class="mb-5 text-blue-500 bg-blue-50 dark:bg-blue-900/20 w-16 h-16 rounded-full flex items-center justify-center mx-auto"><i class="fas fa-copy text-2xl"></i></div>
            <h3 class="text-xl font-serif text-slate-800 dark:text-white mb-2">Replicar Grade Horária</h3>
            <p class="text-sm text-gray-500 mb-6">A sua grade (horários da esquerda) e blocos fixos da agenda serão copiados.</p>
            <div class="space-y-3">
                <button onclick="executeReplicaAgenda(4)" class="w-full py-3.5 bg-gray-100 dark:bg-cm-mid text-slate-800 dark:text-white rounded-xl font-bold hover:bg-gray-200 dark:hover:bg-gray-800 transition">Copiar para as próximas 4 semanas</button>
                <button onclick="executeReplicaAgenda(999)" class="w-full py-3.5 bg-cm-green text-white dark:text-cm-dark rounded-xl font-bold shadow-md hover:bg-cm-greenD transition">Copiar para todo o resto do ano</button>
                <button onclick="closeModal('replica-agenda')" class="w-full py-2 text-xs font-bold text-gray-400 hover:text-gray-600 dark:hover:text-white mt-2">Cancelar</button>
            </div>
        </div>
    </div>

    <!-- ======================================================================
         LÓGICA E FIREBASE
         ====================================================================== -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ⚠️ SUBSTITUA PELAS SUAS CHAVES DO FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyAwQrhAoma0iuofm_MMghCbBnPPtLbrn0E",
            authDomain: "cronomed-4b880.firebaseapp.com",
            projectId: "cronomed-4b880",
            storageBucket: "cronomed-4b880.firebasestorage.app",
            messagingSenderId: "853512629124",
            appId: "1:853512629124:web:42bb7b6808ca5487060bd1"
        };

        // --- O BANCO DE DADOS MASTER (Resumido para a versão inicial) ---
        // Você pode colar os seus 240+ temas aqui depois. Coloquei os essenciais para testar.
        const bancoDeMaterias = [
            { "area": "Clínica Médica", "tema": "Hipertensão Arterial Sistêmica", "prioridade": 1 },
            { "area": "Clínica Médica", "tema": "Insuficiência Cardíaca", "prioridade": 1 },
            { "area": "Clínica Médica", "tema": "Diabetes Mellitus", "prioridade": 1 },
            { "area": "Clínica Médica", "tema": "Doenças da Tireoide", "prioridade": 2 },
            { "area": "Clínica Médica", "tema": "Asma e DPOC", "prioridade": 1 },
            { "area": "Clínica Médica", "tema": "AVC", "prioridade": 1 },
            { "area": "Clínica Médica", "tema": "Lesão Renal Aguda", "prioridade": 1 },
            { "area": "Clínica Médica", "tema": "Sepse e Choque Séptico", "prioridade": 1 },
            { "area": "Clínica Médica", "tema": "Anemias", "prioridade": 2 },
            { "area": "Clínica Médica", "tema": "Lúpus Eritematoso Sistêmico", "prioridade": 3 },
            { "area": "Cirurgia", "tema": "ATLS e Avaliação Inicial do Trauma", "prioridade": 1 },
            { "area": "Cirurgia", "tema": "Abdome Agudo", "prioridade": 1 },
            { "area": "Cirurgia", "tema": "Apendicite Aguda", "prioridade": 1 },
            { "area": "Cirurgia", "tema": "Colelitíase", "prioridade": 2 },
            { "area": "Cirurgia", "tema": "Hérnias da Parede Abdominal", "prioridade": 2 },
            { "area": "Cirurgia", "tema": "Queimaduras", "prioridade": 3 },
            { "area": "Pediatria", "tema": "Reanimação Neonatal", "prioridade": 1 },
            { "area": "Pediatria", "tema": "Puericultura", "prioridade": 1 },
            { "area": "Pediatria", "tema": "Infecções Respiratórias Agudas", "prioridade": 1 },
            { "area": "Pediatria", "tema": "Doenças Exantemáticas", "prioridade": 2 },
            { "area": "Pediatria", "tema": "Cardiopatias Congênitas", "prioridade": 3 },
            { "area": "Ginecologia e Obstetrícia", "tema": "Doença Hipertensiva da Gestação", "prioridade": 1 },
            { "area": "Ginecologia e Obstetrícia", "tema": "Trabalho de Parto Prematuro", "prioridade": 1 },
            { "area": "Ginecologia e Obstetrícia", "tema": "Infecções Sexualmente Transmissíveis", "prioridade": 1 },
            { "area": "Ginecologia e Obstetrícia", "tema": "Sangramento Uterino Anormal", "prioridade": 2 },
            { "area": "Ginecologia e Obstetrícia", "tema": "Anticoncepção", "prioridade": 2 },
            { "area": "Preventiva", "tema": "Princípios do SUS", "prioridade": 1 },
            { "area": "Preventiva", "tema": "Medidas de Associação e Risco", "prioridade": 1 },
            { "area": "Preventiva", "tema": "Vigilância Epidemiológica", "prioridade": 2 }
        ];

        let app, auth, db, currentUser;
        window.state = { weeks: [], progress: {}, dailyStats: {}, simulados: [] };
        window.activeView = 'homepage';
        window.activeWeek = 1;
        window.expandedCards = {};
        window.isDarkMode = false;
        
        // Pomo Variables
        window.pomoTime = 50 * 60;
        window.pomoTotal = 50 * 60;
        window.isPomoRunning = false;
        window.activePomoId = null;
        window.pomoPhase = 'aula';

        // START
        try {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
            
            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    currentUser = user;
                    document.getElementById('user-avatar').innerText = user.email ? user.email[0].toUpperCase() : 'U';
                    document.getElementById('user-email').innerText = user.email;
                    
                    const docSnap = await getDoc(doc(db, "profiles", user.uid));
                    if(docSnap.exists()) {
                        const data = docSnap.data();
                        document.getElementById('user-name').innerText = data.nome || 'Usuário';
                        
                        if (!data.acesso_liberado) { window.location.href = "index.html"; return; }
                        if (!data.has_onboarded) { window.location.href = "onboarding.html"; return; }
                        
                        // Load App State or Generate
                        if (data.app_state && data.app_state.weeks && data.app_state.weeks.length > 0) {
                            window.state = data.app_state;
                            finishLoading();
                        } else {
                            generateSchedule(data.onboarding_data);
                        }
                    } else { window.location.href = "index.html"; }
                } else { window.location.href = "index.html"; }
            });
        } catch(e) {
            console.error("Firebase Auth Error", e);
            document.getElementById('loader-text').innerText = "Erro ao conectar. Executando em modo Demonstração local.";
            generateSchedule({ horas: "4h", internato: "nao", dataInicio: new Date().toISOString(), dataProva: new Date(new Date().setMonth(new Date().getMonth() + 10)).toISOString() });
        }

        // ======================================================================
        // O CÉREBRO: ALGORITMO GERADOR DO CRONOGRAMA
        // ======================================================================
        async function generateSchedule(obData) {
            document.getElementById('loader-text').innerText = "A processar algoritmo de prioridades...";
            
            const start = obData.dataInicio ? new Date(obData.dataInicio) : new Date();
            const end = obData.dataProva ? new Date(obData.dataProva) : new Date(new Date().setMonth(new Date().getMonth() + 10));
            const totalSemanas = Math.max(4, Math.floor((end - start) / (1000 * 60 * 60 * 24 * 7)));
            
            // 1. Filtrar Banco por Tempo
            let filteredDB = bancoDeMaterias.filter(t => t.prioridade <= 2); // default
            if (totalSemanas > 35) filteredDB = bancoDeMaterias; // tem tempo, estuda tudo
            if (totalSemanas < 15) filteredDB = bancoDeMaterias.filter(t => t.prioridade === 1); // intensivo
            
            // 2. Criar Semanas
            const newWeeks = [];
            for(let i=1; i<=totalSemanas; i++) {
                newWeeks.push({
                    week: i,
                    phase: "Estudo Focado",
                    timeSlots: ["08:00 - 12:00", "14:00 - 18:00"],
                    agenda: {},
                    tasks: []
                });
            }

            // 3. Distribuir Tarefas (Simplificado: Espiral Misto)
            let wIdx = 0;
            filteredDB.forEach((task, index) => {
                newWeeks[wIdx].tasks.push({
                    id: `gen_${index}`,
                    category: task.area,
                    subject: task.tema,
                    prioridade: task.prioridade,
                    tipo: "materia_nova"
                });
                wIdx++;
                if(wIdx >= totalSemanas) wIdx = 0;
            });

            window.state.weeks = newWeeks;
            window.state.progress = {};
            window.state.dailyStats = {};

            // 4. Salvar
            await window.saveToCloud();
            finishLoading();
        }

            if(isCorrect) { state.progress[taskId].correct = val; }
            else {
                const oldVal = parseInt(state.progress[taskId].done) || 0; 
                const diff = val - oldVal; 
                state.progress[taskId].done = val;

        window.executeReplicaAgenda = function(weeksAhead) {
            const sourceW = state.weeks.find(w => w.week === activeWeek);

            state.weeks.forEach(w => {

                        </div>
                        <div class="flex items-center gap-3 bg-gray-50 dark:bg-cm-dark p-3 rounded-xl border border-gray-100 dark:border-gray-800 shrink-0">
                            <div class="text-center"><span class="text-[9px] font-bold text-gray-400 uppercase tracking-widest mb-1 block">Feitas</span><input type="number" value="${p.done||''}" onchange="window.updateTaskQuestions('${taskId}', this.value)" class="w-12 bg-transparent text-center font-bold text-slate-800 dark:text-white outline-none border-b border-gray-300 dark:border-gray-700 focus:border-cm-green py-1" placeholder="-"></div>
                            <div class="text-center"><span class="text-[9px] font-bold text-gray-400 uppercase tracking-widest mb-1 block">Acertos</span><input type="number" value="${p.correct||''}" onchange="window.updateTaskQuestions('${taskId}', this.value, true)" class="w-12 bg-transparent text-center font-bold text-slate-800 dark:text-white outline-none border-b border-gray-300 dark:border-gray-700 focus:border-cm-green py-1" placeholder="-"></div>
                            <div class="pl-3 border-l border-gray-200 dark:border-gray-800 text-center min-w-[3.5rem]"><span class="text-[9px] font-bold text-gray-400 uppercase tracking-widest mb-1 block">%</span><span class="text-lg font-black ${acc>0?'text-cm-green':'text-gray-400'}">${acc}%</span></div>
                        </div>
                    </div>`;
                }
                tasksHtml += `</div>`;
            });
            
            tasksHtml += `<button onclick="window.openAddTaskModal(${activeWeek})" class="w-full py-6 border-2 border-dashed border-gray-300 dark:border-gray-700 rounded-2xl text-gray-400 hover:text-cm-green hover:border-cm-green transition font-bold text-sm mt-2 flex items-center justify-center gap-2"><i class="fas fa-plus"></i> Inserir Tema Avulso</button></div>`;
            
            content.innerHTML = agendaHtml + tasksHtml;
        }

        window.renderDashboard = function() {
            const content = document.getElementById('content-area'); 
            content.innerHTML = `<div class="fade-enter"><h2 class="text-3xl font-serif text-slate-900 dark:text-white mb-6">Dashboard</h2><div class="card-ui p-10 text-center"><i class="fas fa-chart-line text-5xl text-gray-300 dark:text-gray-700 mb-4"></i><p class="text-gray-500 font-bold">Gráficos de evolução serão preenchidos conforme avança no Cronograma.</p></div></div>`;
        }

        window.renderSearch = function() {
            const content = document.getElementById('content-area'); 
            content.innerHTML = `<div class="fade-enter"><h2 class="text-3xl font-serif text-slate-900 dark:text-white mb-6">Banco de Tarefas</h2><div class="card-ui p-10 text-center"><i class="fas fa-search text-5xl text-gray-300 dark:text-gray-700 mb-4"></i><p class="text-gray-500 font-bold">Pesquise pelas ${bancoDeMaterias.length}+ matérias mapeadas.</p></div></div>`;
        }

        window.updateUI = function() { 
            window.renderNav(); 
            if(activeView === 'homepage') window.renderHomepage(); 
            else if(activeView === 'dashboard') window.renderDashboard(); 
            else if (activeView === 'search') window.renderSearch(); 
            else window.renderWeek(); 
            
            // Calc Global Prog
            let total = 0, done = 0;
            state.weeks.forEach(w => { total += w.tasks.length; w.tasks.forEach(t => { if(state.progress[t.id]?.doneStatus) done++; }) });
            const pct = total ? Math.round((done/total)*100) : 0;
            document.getElementById('global-progress').style.width = `${pct}%`;
            document.getElementById('global-percent-text').innerText = `${pct}%`;
        }
    </script>
</body>
</html>
